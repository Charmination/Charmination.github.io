<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aquarium Site</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
/* =========================
   VARIABLES + BASE RESET
========================= */
:root{
  --teal:#0abab5;
  --aqua:#87ffdd;
  --custard:#fcf4af;
}

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  width:100%;
  background:#097a77;
}

/* =========================
   LAYOUT CONTAINER
========================= */
.scene{
  display:flex;
  flex-direction:column;
  width:100%;
  min-height:100vh;
  font-family:'Press Start 2P', monospace;
}

/* =========================
   LAMP TOGGLE
========================= */
.lamp-btn{position:absolute;top:14px;right:18px;z-index:20;background:none;border:none;cursor:pointer;}
.lamp-head{width:54px;height:36px;border-radius:50% 50% 0 0;background:linear-gradient(160deg,#ffe066,#ffb830);}
.lamp-head.off{background:linear-gradient(160deg,#b0aead,#888);}
.lamp-glow{position:absolute;top:-14px;left:-18px;width:90px;height:68px;background:radial-gradient(circle,rgba(255,224,80,.4),transparent);}
.lamp-glow.off{opacity:0;}

/* =========================
   TANK
========================= */
.tank-wrap{
  position:relative;
  flex:1;
  border:4px solid rgba(255,255,255,.5);
  overflow:hidden;
  background:linear-gradient(180deg,#c2fff0,#0abab5,#097a77);
}

.tank-wrap.dark-mode{
  background:linear-gradient(180deg,#053a35,#021a18);
}

/* =========================
   FISH AREA
========================= */
.fish-area{
  position:absolute;
  inset:0;
  z-index:5;
}

.fish{
  position:absolute;
  cursor:pointer;
}

.fish canvas{
  display:block;
}

.fish-label{
  position:absolute;
  bottom:110%;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.7);
  color:#fcf4af;
  font-size:10px;
  padding:4px 8px;
  opacity:0;
}

.fish:hover .fish-label{opacity:1;}

.zzz{display:none;position:absolute;top:-20px;font-size:10px;}
.fish.asleep .zzz{display:block;}

/* =========================
   NAV POPUPS
========================= */
.nav-popup{
  display:none;
  position:fixed;
  z-index:999;
  background:#075a55;
  border:2px solid var(--aqua);
  padding:12px;
}

.nav-popup.show{display:block;}

/* =========================
   OVERLAYS
========================= */
.overlay-base{
  display:none;
  position:absolute;
  z-index:999;
  background:#5a300a;
  padding:16px;
}

.overlay-base.show{display:block;}

/* =========================
   BOTTOM BAR
========================= */
.bottom-bar{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px;
}

.feed-btn{
  padding:10px 20px;
  background:#c87820;
  border:3px solid #c8843a;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="scene">

  <!-- =========================
       LAMP
  ========================== -->
  <button class="lamp-btn" id="lampBtn">
    <div class="lamp-glow" id="lampGlow"></div>
    <div class="lamp-head" id="lampHead"></div>
  </button>

  <!-- =========================
       TANK
  ========================== -->
  <div class="tank-wrap" id="tank">

    <div class="fish-area" id="fishArea">

      <!-- FISH -->
      <div class="fish" id="fishBetta">
        <canvas id="bettaCanvas"></canvas>
        <div class="zzz">z z z</div>
        <div class="fish-label">Projects</div>
      </div>

      <div class="fish" id="fishOranda">
        <canvas id="orandaCanvas"></canvas>
        <div class="zzz">z z z</div>
        <div class="fish-label">About</div>
      </div>

      <div class="fish" id="fishPleco">
        <canvas id="plecoCanvas"></canvas>
        <div class="zzz">z z z</div>
        <div class="fish-label">Socials</div>
      </div>

      <!-- OVERLAYS (content sections) -->
      <section id="about"><h1>About Me</h1></section>
      <section id="resume"><h1>Resume</h1></section>

    </div>

    <canvas id="mainCanvas"></canvas>

  </div>

  <!-- =========================
       NAV POPUPS (ONE COPY ONLY)
  ========================== -->
  <div id="navBetta" class="nav-popup">
    <div>Projects</div>
  </div>

  <div id="navOranda" class="nav-popup">
    <div>About</div>
    <a href="#about">About Me</a>
    <a href="#resume">Resume</a>
  </div>

  <div id="navPleco" class="nav-popup">
    <div>Socials</div>
  </div>

  <!-- =========================
       BOTTOM BAR
  ========================== -->
  <div class="bottom-bar">
    <button class="feed-btn" id="feedBtn">FEED</button>
  </div>

</div>

<!-- =========================
     JAVASCRIPT (SECTIONED)
========================= -->

function init(){}

/* ========= FISH MOVEMENT ========= */
function swim(){}

/* ========= POPUPS ========= */
function openPopup(){}

/* ========= DARK MODE ========= */
function toggleDark(){}

/* ========= EVENTS ========= */
document.getElementById('lampBtn').onclick = toggleDark;

</script>

</body>
</html>
